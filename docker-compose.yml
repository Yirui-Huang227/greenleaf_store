services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: greenleaf_web_dev
    restart: unless-stopped
    environment:
      RAILS_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
      - ./db:/rails/db
      - ./storage:/rails/storage

volumes:
  bundle_data: